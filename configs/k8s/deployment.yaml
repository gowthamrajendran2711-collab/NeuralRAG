apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuralrag-api
  namespace: neuralrag
spec:
  replicas: 3
  selector:
    matchLabels:
      app: neuralrag-api
  template:
    metadata:
      labels:
        app: neuralrag-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: api
        image: yourusername/neuralrag:latest
        ports:
        - containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: neuralrag-secrets
              key: openai-api-key
        - name: QDRANT_URL
          value: "http://qdrant-svc:6333"
        - name: REDIS_URL
          value: "redis://redis-svc:6379"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neuralrag-hpa
  namespace: neuralrag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neuralrag-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
